<!-- Open Door Design Carousel Template -->
<div id="global-status" class="visually-hidden" aria-live="polite" aria-atomic="true"></div>

<section class="carousel-shell" aria-labelledby="example-carousel-title">
  <div id="example-carousel" class="carousel-region" role="region" aria-roledescription="carousel" aria-labelledby="example-carousel-title" tabindex="0" data-carousel data-carousel-name="Example carousel">
    <h2 id="example-carousel-title">Example carousel</h2>
    <p class="carousel-instructions">Use Previous slide and Next slide to move between slides. Use Pause motion to stop automatic rotation.</p>
    <p class="status-line" data-status>Automatic slide rotation is active.</p>
    <div class="visually-hidden" data-live aria-live="polite" aria-atomic="true"></div>

    <div class="slides">
      <article class="slide active" data-slide="1" aria-labelledby="example-slide-1-heading" aria-describedby="example-slide-1-desc" tabindex="-1">
        <div class="slide-summary" tabindex="0" role="group" aria-labelledby="example-slide-1-heading" aria-describedby="example-slide-1-desc" data-slide-summary>
          <p class="slide-count">Slide 1 of 2</p>
          <h2 id="example-slide-1-heading" tabindex="-1">First slide heading</h2>
          <p id="example-slide-1-desc">First slide description.</p>
        </div>
      </article>

      <article class="slide" data-slide="2" aria-labelledby="example-slide-2-heading" aria-describedby="example-slide-2-desc" tabindex="-1" hidden>
        <div class="slide-summary" tabindex="0" role="group" aria-labelledby="example-slide-2-heading" aria-describedby="example-slide-2-desc" data-slide-summary>
          <p class="slide-count">Slide 2 of 2</p>
          <h2 id="example-slide-2-heading" tabindex="-1">Second slide heading</h2>
          <p id="example-slide-2-desc">Second slide description.</p>
        </div>
      </article>
    </div>

    <div class="carousel-controls" aria-label="Carousel controls">
      <button type="button" class="secondary-button" data-prev>Previous slide</button>
      <button type="button" data-pause>Pause motion</button>
      <button type="button" class="secondary-button" data-next>Next slide</button>
      <p data-position aria-live="off">Slide 1 of 2</p>
    </div>
  </div>
</section>
